version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - gateways-mock
    networks:
      - betalent-network

  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: betalent_db
      MYSQL_USER: betalent_user
      MYSQL_PASSWORD: betalent_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - betalent-network
      
  gateways-mock:
    image: matheusprotzen/gateways-mock
    ports:
      - "3001:3001"
      - "3002:3002"
    networks:
      - betalent-network

networks:
  betalent-network:
    driver: bridge

volumes:
  db_data: